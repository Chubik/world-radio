<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Radio Mini · design canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{ margin:0; padding:0; }
  /* CRT animations shared by all components */
  @keyframes wrSpec{ 0%,100%{ height: var(--wr-spec-min); } 50%{ height: var(--wr-spec-max); } }
  .wr-spec-bar{ animation: wrSpec 0.9s ease-in-out infinite; }
  @keyframes wrPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.28; } }
  .wr-pulse{ animation: wrPulse 1.1s ease-in-out infinite; }
  @keyframes wrEq{ 0%,100%{ transform: scaleY(.45); } 50%{ transform: scaleY(1); } }
  .wr-eq{ animation: wrEq 0.7s ease-in-out infinite; }
  @keyframes wrMarquee{ 0%{ transform: translateX(0); } 100%{ transform: translateX(-50%); } }
  .wr-marquee{ animation: wrMarquee 9s linear infinite; }
  @media (prefers-reduced-motion: reduce){
    .wr-spec-bar,.wr-pulse,.wr-eq,.wr-marquee{ animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="themes.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="mini-window.jsx"></script>
<script type="text/babel" src="platforms.jsx"></script>
<script type="text/babel" src="android.jsx"></script>
<script type="text/babel" src="canvas-app.jsx"></script>
