<style>
  html,body{ margin:0; padding:0; }
  @keyframes r4blink{ 0%,55%{opacity:1} 56%,100%{opacity:.12} }

  .r4-eq{ transform-origin:bottom; animation:r4eq .9s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce){ .r4-cursor,.r4-eq{ animation:none !important; } }
</style>
