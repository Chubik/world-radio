name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: system libs (cpal needs alsa, tauri needs gtk/glib/webkit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libglib2.0-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev librsvg2-dev

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  android-release:
    name: android apk beta release
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - name: install sdk packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: build debug apk
        run: cd android && ./gradlew assembleDebug

      - name: package apk and checksum
        id: pkg
        run: |
          version=$(grep versionName android/app/build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          apk="r4dio-${version}-beta.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$apk"
          sha256sum "$apk" > SHA256SUMS-android
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "apk=$apk" >> "$GITHUB_OUTPUT"

      - name: release notes
        run: |
          {
            printf '⚠️ Beta / debug-signed build — not for production. Installs on any Android 8+ device.\n\n'
            printf "## What's new\n\n"
            printf -- '- Sync favourites and blocklist across your devices — link them with a key or QR code.\n'
            printf -- '- Mirror playback: switch station on one device and the rest follow.\n'
            printf -- '- Manage sync from the media tray: create or scan a key, copy it, log out.\n'
            printf -- '- macOS (Apple Silicon and Intel) prebuilt CLI binaries now available.\n\n'
            printf '## Install\n\nDownload `%s`, then verify:\n\n' "${{ steps.pkg.outputs.apk }}"
            printf '```\nsha256sum -c SHA256SUMS-android\n```\n'
          } > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }} — Android beta
          body_path: release-notes.md
          prerelease: true
          files: |
            ${{ steps.pkg.outputs.apk }}
            SHA256SUMS-android

      - name: keep only the latest 5 releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | while read -r tag; do
                [ -n "$tag" ] || continue
                echo "deleting old release $tag"
                gh release delete "$tag" --cleanup-tag --yes || true
              done

  cli-release:
    name: cli tarball
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: system libs (linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libglib2.0-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev librsvg2-dev

      - name: build
        run: cargo build --release -p radio-tui --target ${{ matrix.target }}

      - name: package
        id: pkg
        run: |
          version=$(grep '^version' crates/radio-tui/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          asset="world-radio-${version}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$asset" world-radio
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha"
          else
            shasum -a 256 "$asset" > "$asset.sha"
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha

  cli-release-publish:
    name: publish cli tarballs
    needs: [android-release, cli-release]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist

      - name: combine checksums
        id: sums
        run: |
          version=$(grep '^version' crates/radio-tui/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          cd dist
          cat ./*.tar.gz.sha | sed 's# \./# #' > SHA256SUMS
          rm -f ./*.sha
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.sums.outputs.version }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
