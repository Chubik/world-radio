name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  actions: write

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: system libs (cpal needs alsa, tauri needs gtk/glib/webkit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libglib2.0-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev librsvg2-dev

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  version:
    name: compute + tag version
    runs-on: ubuntu-latest
    # skip when the head commit is our own stamp commit, else the push it makes
    # would re-trigger this job forever.
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && !startsWith(github.event.head_commit.message, 'release: v')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      notes: ${{ steps.bump.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: compute next version
        id: bump
        run: |
          git fetch --tags
          last="$(git tag -l 'v*' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)"
          [ -n "$last" ] || last="$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          level=patch
          msg="$(git log -1 --pretty=%B)"
          case "$msg" in
            *'[major]'*) level=major ;;
            *'[minor]'*) level=minor ;;
          esac
          next="$(./scripts/bump-version.sh next "$last" "$level")"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "last=$last level=$level next=$next"

          # changelog: user-facing feat/fix commits since the last tag, prefixes
          # stripped. drop chore/ci/style/docs/test/build and release commits.
          range="v${last}..HEAD"
          git rev-parse -q --verify "v${last}" >/dev/null 2>&1 || range="HEAD"
          notes="$(git log "$range" --no-merges --pretty=%s \
            | grep -E '^(feat|fix)(\([^)]*\))?!?:' \
            | sed -E 's/^(feat|fix)(\([^)]*\))?!?: *//' \
            | sed 's/^/- /' || true)"
          [ -n "$notes" ] || notes="- Maintenance and internal improvements."
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: stamp files + tag
        run: |
          ver="${{ steps.bump.outputs.version }}"
          ./scripts/bump-version.sh stamp "$ver"
          git config user.name "ci"
          git config user.email "ci@users.noreply.github.com"
          git add Cargo.toml android/app/build.gradle.kts
          # refresh lockfile so the crate version in Cargo.lock matches
          cargo update -p radio-tui --precise "$ver" 2>/dev/null || cargo generate-lockfile
          git add Cargo.lock || true
          # the tag carries the stamped version; main files are left untouched
          # (branch protection forbids CI pushing to main). the tag is the
          # source of truth for the release; release jobs check out this tag.
          git commit -m "release: v${ver}"
          git tag "v${ver}"
          git push origin "v${ver}"

  android-release:
    name: android apk beta release
    runs-on: ubuntu-latest
    needs: version
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && !startsWith(github.event.head_commit.message, 'release: v')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - name: install sdk packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: build debug apk
        run: cd android && ./gradlew assembleDebug

      - name: package apk and checksum
        id: pkg
        run: |
          version="${{ needs.version.outputs.version }}"
          apk="r4dio-${version}-beta.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$apk"
          sha256sum "$apk" > SHA256SUMS-android
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "apk=$apk" >> "$GITHUB_OUTPUT"

      - name: release notes
        env:
          CHANGELOG: ${{ needs.version.outputs.notes }}
        run: |
          {
            printf '# r4dio v%s\n\n' "${{ needs.version.outputs.version }}"
            printf 'One release, all platforms — CLI (Linux + macOS) and the Android APK.\n\n'
            printf "## What's new\n\n"
            printf '%s\n\n' "$CHANGELOG"
            printf '## Install\n\n'
            printf 'CLI: `curl -fsSL https://r4dio.net/install | sh`\n\n'
            printf 'Android: download `%s` (debug-signed beta, Android 8+).\n\n' "${{ steps.pkg.outputs.apk }}"
            printf 'Verify: `sha256sum -c SHA256SUMS` (CLI) / `sha256sum -c SHA256SUMS-android` (APK).\n'
          } > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: r4dio v${{ needs.version.outputs.version }}
          body_path: release-notes.md
          prerelease: true
          files: |
            ${{ steps.pkg.outputs.apk }}
            SHA256SUMS-android

      - name: keep only the latest 5 releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | while read -r tag; do
                [ -n "$tag" ] || continue
                echo "deleting old release $tag"
                gh release delete "$tag" --cleanup-tag --yes || true
              done

  cli-release:
    name: cli tarball
    needs: version
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && !startsWith(github.event.head_commit.message, 'release: v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}
          fetch-depth: 0

      - name: rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: system libs (linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libglib2.0-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev librsvg2-dev

      - name: build
        run: cargo build --release -p radio-tui --target ${{ matrix.target }}

      - name: package
        id: pkg
        run: |
          version="${{ needs.version.outputs.version }}"
          asset="r4dio-${version}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$asset" r4dio
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha"
          else
            shasum -a 256 "$asset" > "$asset.sha"
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          retention-days: 1
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha

  cli-release-publish:
    name: publish cli tarballs
    needs: [version, android-release, cli-release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist

      - name: combine checksums
        id: sums
        run: |
          version="${{ needs.version.outputs.version }}"
          cd dist
          cat ./*.tar.gz.sha | sed 's# \./# #' > SHA256SUMS
          rm -f ./*.sha
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.sums.outputs.version }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: trigger ops deploy (site + stat + firebase)
        env:
          OPS_TOKEN: ${{ secrets.ADO_OPS_TOKEN }}
        run: |
          # release is fully published now — ping ops so it deploys the new
          # version immediately instead of waiting for its 30-min cron. this is
          # best-effort: a failure here must not fail the release, since the ops
          # cron still picks the new version up within 30 min.
          if [ -z "$OPS_TOKEN" ]; then
            echo "ADO_OPS_TOKEN not set — ops will pick this up on its next cron"
            exit 0
          fi
          code="$(curl -sS -o /tmp/ops-resp.txt -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $OPS_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Chubik/world-radio-ops/dispatches \
            -d '{"event_type":"release-published","client_payload":{"version":"${{ steps.sums.outputs.version }}"}}')"
          if [ "$code" = "204" ]; then
            echo "dispatched release-published to ops for v${{ steps.sums.outputs.version }}"
          else
            echo "ops dispatch failed with HTTP $code — ops cron will still pick it up"
            echo "response body:"; cat /tmp/ops-resp.txt
          fi

      - name: reclaim actions storage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # keep only the 10 most recent workflow runs — logs are the bulk of the
          # 0.5gb actions storage and pile up every release.
          gh api "/repos/${{ github.repository }}/actions/runs?per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[10:] | .[].id' \
            | while read -r rid; do
                [ -n "$rid" ] || continue
                gh api -X DELETE "/repos/${{ github.repository }}/actions/runs/$rid" >/dev/null 2>&1 \
                  && echo "deleted run $rid" || true
              done
          # drop all actions caches (rebuilt on demand next run)
          gh api "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq '.actions_caches[].id' \
            | while read -r cid; do
                [ -n "$cid" ] || continue
                gh api -X DELETE "/repos/${{ github.repository }}/actions/caches/$cid" >/dev/null 2>&1 \
                  && echo "deleted cache $cid" || true
              done
